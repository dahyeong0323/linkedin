<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}LinkedIn Publisher{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1f2328;
        --muted: #687076;
        --border: #d8dee4;
        --blue: #0a66c2;
        --green: #16794c;
        --red: #b42318;
        --amber: #a15c07;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }
      nav {
        max-width: 1120px;
        margin: 0 auto;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      nav a {
        color: var(--blue);
        text-decoration: none;
        font-weight: 700;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 28px 24px 60px;
      }
      h1 { margin: 0 0 18px; font-size: 28px; }
      h2 { margin: 28px 0 12px; font-size: 18px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 18px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      label {
        display: block;
        font-weight: 700;
        margin-bottom: 7px;
      }
      input, select, textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 11px;
        font: inherit;
        background: #fff;
      }
      textarea {
        min-height: 220px;
        resize: vertical;
        line-height: 1.45;
      }
      button, .button {
        border: 0;
        border-radius: 6px;
        padding: 9px 13px;
        background: var(--blue);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
      }
      button.secondary { background: #56616d; }
      button.success { background: var(--green); }
      button.danger { background: var(--red); }
      button.warning { background: var(--amber); }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-top: 14px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      th, td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: top;
      }
      th {
        background: #eef2f6;
        font-size: 13px;
      }
      tr:last-child td { border-bottom: 0; }
      .status {
        display: inline-block;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 700;
        background: #fff;
      }
      .muted { color: var(--muted); }
      .error {
        border: 1px solid #f1a29a;
        background: #fff1f0;
        color: var(--red);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 16px;
      }
      .pre {
        white-space: pre-wrap;
        line-height: 1.45;
      }
      @media (max-width: 780px) {
        .grid { grid-template-columns: 1fr; }
        table { display: block; overflow-x: auto; }
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <a href="/drafts">LinkedIn Publisher</a>
        <span><a href="/auth/status">Auth</a></span>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
